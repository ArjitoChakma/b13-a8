version: '3.8'

services:
  app:
    build: .
    container_name: tiles-gallery-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_MONGODB_URI=${NEXT_PUBLIC_MONGODB_URI:-mongodb://mongodb:27017/tilegallery}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-your-secret-key}
      - BETTER_AUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - mongodb
    networks:
      - tiles-network
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: tiles-mongodb
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=tilegallery
    ports:
      - '27017:27017'
    networks:
      - tiles-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  tiles-network:
    driver: bridge
